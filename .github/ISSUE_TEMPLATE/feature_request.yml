name: Feature / Change Request
description: Request a new feature or improvement
title: "[Request]: "
labels: ["enhancement"]
assignees: ["luvchikavi"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Dashboard
        - Activities / Data Entry
        - Import (Excel/CSV)
        - Reports / Export
        - Sites Management
        - Settings / Organization
        - Login / Authentication
        - Billing
        - CBAM Module
        - New Module
        - Landing Page / Website
        - Other
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - High (client waiting)
        - Medium (should do soon)
        - Low (backlog)
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What do you need?
      placeholder: Describe the feature or change...
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why is this needed?
      placeholder: Which client asked? What problem does it solve?
    validations:
      required: false
  - type: input
    id: client
    attributes:
      label: Client name (if client-specific)
      placeholder: e.g. "Acme Corp"
    validations:
      required: false
